services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcg-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg-sqlserver
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Fcg@Sql2024!"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Fcg@Sql2024!' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  usersapi:
    build: ../FCG.UsersAPI
    container_name: fcg-usersapi
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver;Database=FCG_UsersDB;User Id=sa;Password=Fcg@Sql2024!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Secret: "super-secret-key-fcg-users-api-2024-min-32-chars!!"
      Jwt__Issuer: "FCG.UsersAPI"
      Jwt__Audience: "FCG"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  catalogapi:
    build: ../FCG.CatalogAPI
    container_name: fcg-catalogapi
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver;Database=FCG_CatalogDB;User Id=sa;Password=Fcg@Sql2024!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Secret: "super-secret-key-fcg-users-api-2024-min-32-chars!!"
      Jwt__Issuer: "FCG.UsersAPI"
      Jwt__Audience: "FCG"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  paymentsapi:
    build: ../FCG.PaymentsAPI
    container_name: fcg-paymentsapi
    ports:
      - "5003:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver;Database=FCG_PaymentsDB;User Id=sa;Password=Fcg@Sql2024!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Jwt__Secret: "super-secret-key-fcg-users-api-2024-min-32-chars!!"
      Jwt__Issuer: "FCG.UsersAPI"
      Jwt__Audience: "FCG"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  notificationsapi:
    build: ../FCG.NotificationsAPI
    container_name: fcg-notificationsapi
    ports:
      - "5004:8080"
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
